<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Icone de marque GlyphLapse — concept « Sweep », style Nothing :
       fond blanc, anneau des secondes + aiguille noire, moyeu rouge #D71921.
       Miroir de app/src/main/res/drawable/ic_launcher.xml. -->

  <!-- fond blanc, coins arrondis facon tuile Nothing -->
  <rect width="512" height="512" rx="112" fill="#FFFFFF"/>

  <!-- anneau des secondes : ouverture de 70 deg en haut -->
  <path d="M370.72,92.17 A200,200 0 1 1 141.28,92.17"
        fill="none" stroke="#0A0A0A" stroke-width="64" stroke-linecap="round"/>

  <!-- aiguille noire, inclinee vers ~2h -->
  <line x1="256" y1="256" x2="410.15" y2="167.00"
        stroke="#0A0A0A" stroke-width="64" stroke-linecap="round"/>

  <!-- moyeu : contour blanc (26 px) + disque rouge de marque -->
  <circle cx="256" cy="256" r="70" fill="#FFFFFF"/>
  <circle cx="256" cy="256" r="44" fill="#D71921"/>
</svg>
